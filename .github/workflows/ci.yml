name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Biome lint
        run: pnpm exec biome check .

      - name: TypeScript check
        run: pnpm tsc --noEmit

      - name: Unit tests
        run: pnpm test

      - name: Package boundaries
        run: pnpm boundaries

      - name: Validate content trove
        run: pnpm exec tsx scripts/validate-trove.ts

      - name: Web build
        run: pnpm build

      # Playwright browsers MUST be installed before `pnpm test:browser`.
      # Without this step, Vitest browser mode silently reports "no tests"
      # with an unhandled Executable-not-found error — and because we
      # previously had `continue-on-error: true` on the next step, every
      # browser test was invisibly skipping in CI. Discovered 2026-04-19.
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # NO continue-on-error — browser-test regressions MUST fail CI.
      # A green build with zero browser tests running is worse than a
      # red build with visible breakage.
      - name: Browser smoke tests
        run: pnpm test:browser

      - name: Upload browser test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-test-results
          path: |
            test-results/
            playwright-report/
            __screenshots__/
          retention-days: 7

      # Always upload fixture screenshots so the team can visually verify
      # the authored asset catalog on every PR, even when tests pass.
      - name: Upload fixture screenshots (always)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fixture-screenshots
          path: __screenshots__/
          if-no-files-found: ignore
          retention-days: 30
