name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5.0.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Biome lint
        run: pnpm exec biome check .

      - name: TypeScript check
        run: pnpm tsc --noEmit

      - name: Unit tests
        run: pnpm test

      - name: Package boundaries
        run: pnpm boundaries

      - name: Validate content trove
        run: pnpm exec tsx scripts/validate-trove.ts

      - name: Web build
        run: pnpm build

      - name: Asset size gate
        run: |
          SIZE=$(du -sm public/assets/ | cut -f1)
          echo "public/assets/ is ${SIZE}MB"
          if [ "$SIZE" -gt 100 ]; then
            echo "ERROR: public/assets/ exceeds 100MB baked-in ceiling (${SIZE}MB)"
            exit 1
          fi

      - name: Browser smoke tests
        run: pnpm test:browser
        continue-on-error: true

      - name: Upload browser test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7
