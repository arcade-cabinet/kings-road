version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      three:
        patterns:
          - "three"
          - "@types/three"
          - "@react-three/*"
          - "postprocessing"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
          - "@playwright/*"
          - "happy-dom"
      build:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "typescript"
          - "@biomejs/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
